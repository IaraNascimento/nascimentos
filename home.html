<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Álbum da Família Nascimento - Galeria</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <header class="header">
      <button id="logoutButton">sair</button>
      <h1 class="title">Os Nascimentos</h1>
      <!-- <h2 class="family-name">Álbum Particular</h2> -->
      <p class="subtitle">Nossas memórias ✨</p>
    </header>

    <section class="filters">
      <div class="filter-group">
        <label>Ano Inicial</label>
        <input
          type="number"
          id="filterYearStart"
          value="1900"
          placeholder="1900"
        />
      </div>

      <div class="filter-group">
        <label>Ano Final</label>
        <input
          type="number"
          id="filterYearEnd"
          value="2999"
          placeholder="2999"
        />
      </div>

      <div class="filter-group">
        <label>Local</label>
        <input
          type="text"
          id="filterLocation"
          value=""
          placeholder="local..."
        />
      </div>

      <div class="filter-group">
        <label>Pessoas</label>
        <select id="filterPeople">
          <option value="">Todes</option>
          <option value="Iara">Iara</option>
          <option value="Marquesa">Marquesa</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Tipo</label>
        <select id="filterEvent">
          <option value="">Todos</option>
          <option value="Aniversário">Aniversário</option>
          <option value="Natal">Natal</option>
          <option value="Ano Novo">Ano Novo</option>
          <option value="Espontâneo">Espontâneo</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Ordenar Por</label>
        <select id="sortSelect">
          <option value="dateAsc">Data Crescente</option>
          <option value="dateDesc">Data Decrescente</option>
          <option value="locationAsc">Local A-Z</option>
          <option value="locationDesc">Local Z-A</option>
          <option value="peopleAsc">Pessoas A-Z</option>
          <option value="peopleDesc">Pessoas Z-A</option>
        </select>
      </div>
    </section>

    <main class="gallery" id="gallery"></main>

    <footer class="app-footer">
      <div class="footer-left">feito com carinho | @iara.nascimento.sztybe</div>

      <div class="footer-center">
        <label for="photoUpload" class="upload-button">enviar</label>
        <input type="file" id="photoUpload" multiple accept="image/*" hidden />
      </div>

      <div class="footer-right">
        <span id="photoCounter"></span>
      </div>
    </footer>

    <div id="photoModal" class="modal hidden">
      <div class="modal-content">
        <h3>Registrar nova memória</h3>

        <form id="photoForm">
          <div>
            <input
              type="number"
              id="yearStart"
              placeholder="Ano inicial* (obrigatório)"
              required
            />

            <input type="number" id="yearEnd" placeholder="Ano final" />
          </div>

          <input type="text" id="location" placeholder="Local" />

          <input
            type="text"
            id="people"
            placeholder="Pessoas (separadas por vírgula)"
          />

          <select id="event">
            <option value="">Tipo de evento</option>
            <option value="Aniversário">Aniversário</option>
            <option value="Natal">Natal</option>
            <option value="Ano Novo">Ano Novo</option>
            <option value="Espontâneo">Espontâneo</option>
          </select>

          <!-- <textarea id="description" placeholder="Descrição"></textarea> -->

          <div class="modal-actions">
            <button type="button" id="cancelPhoto">Cancelar</button>
            <button type="submit">Gravar</button>
          </div>
        </form>
      </div>
    </div>
  </body>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</html>
